[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "Unlicense",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "Unicode-3.0",
    "GPL-3.0",
]

[[licenses.clarify]]
name = "unicode-ident"
version = "1.0.22"
expression = "(MIT OR Apache-2.0) AND Unicode-3.0"
license-files = [{ path = "LICENSE-MIT", hash = 0x0 }, { path = "LICENSE-APACHE", hash = 0x0 }, { path = "LICENSE-UNICODE", hash = 0x0 }]

[advisories]
unmaintained = "workspace"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"